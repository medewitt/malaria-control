name: Deploy Website

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install R dependencies
        run: |
          install.packages(c("shinylive", "httpuv"))
        shell: Rscript {0}

      - name: Install Quarto extension
        run: |
          quarto add quarto-ext/shinylive --no-prompt

      - name: Render Quarto Website
        run: |
          # Set repos in .Rprofile so they are used by shinylive::export during render
          echo 'options(repos = c(mrcide = "https://mrc-ide.r-universe.dev", malamodel = "https://medewitt.github.io/malaria-simulator/bin/emscripten/contrib/4.3", CRAN = "https://repo.r-wasm.org"))' > .Rprofile
          quarto render

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
